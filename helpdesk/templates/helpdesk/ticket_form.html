{% extends "base.html" %}
{% block title %}{{ title }} — Служба заявок{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="card-title mb-3">{{ title }}</h4>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% for error in field.errors %}
                                <div class="text-danger small">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{% url 'ticket_list' %}" class="btn btn-link">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
