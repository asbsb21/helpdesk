# Конфигурация деплоя на Render (Infrastructure as Code).
# Создаёт веб-сервис + бесплатную базу PostgreSQL.
services:
  - type: web
    name: helpdesk
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DATABASE_URL
        fromDatabase:
          name: helpdesk-db
          property: connectionString

databases:
  - name: helpdesk-db
    plan: free
