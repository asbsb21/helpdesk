{% extends "base.html" %}
{% block title %}Вход — Служба заявок{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="card-title mb-3">Вход в систему</h4>
                {% if form.errors %}
                    <div class="alert alert-danger">Неверное имя пользователя или пароль.</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            <input type="{% if field.name == 'password' %}password{% else %}text{% endif %}"
                                   name="{{ field.name }}" class="form-control" required>
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
